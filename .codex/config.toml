command = "/home/krisd/code/dev-modules/.codex/hooks/pre_compact_handoff.sh"

[[hooks.Stop]]
matcher = ""

[[hooks.Stop.hooks]]
type = "command"
command = "/home/krisd/code/dev-modules/.codex/hooks/validate_state.sh"
